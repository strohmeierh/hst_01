name: Update cam status

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cam-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh cam status
        run: python scripts/update_cam_status.py

      - name: Commit status file if changed
        run: |
          if [[ -n "$(git status --porcelain data/cam-status.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/cam-status.json
            git commit -m "chore: update cam status [skip ci]"
            git push
          else
            echo "No changes."
          fi

